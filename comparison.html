<html lang="ja">
<head>

<title>新体力テスト結果の比較レポート</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;font-size:14px}
:root{--navy:#1e3a5f;--navy2:#2a4f7e;--blue:#2563eb;--green:#16a34a;--amber:#d97706;--red:#dc2626}

#header{background:var(--navy);color:#fff;padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
#header h1{font-size:18px;font-weight:700;letter-spacing:.05em}
#header p{font-size:11px;color:#93c5fd;margin-top:2px}
#main{max-width:960px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px}

.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);border:1px solid #e2e8f0;padding:20px}
.card-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#1e293b;margin-bottom:14px}
.card-title .badge{width:20px;height:20px;border-radius:4px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:background .15s}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:#fff;color:var(--navy);border:1.5px solid var(--navy)}
.btn-secondary:hover{background:#eff6ff}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#15803d}
.btn-green:disabled{opacity:.5;cursor:not-allowed}

.import-step{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;margin-bottom:8px;transition:border-color .2s}
.import-step.loaded{border-color:#16a34a;background:#f0fdf4}
.import-step.error{border-color:#dc2626;background:#fef2f2}
.import-num{width:28px;height:28px;border-radius:50%;background:#e2e8f0;color:#475569;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.import-step.loaded .import-num{background:#16a34a;color:#fff}
.import-info{flex:1;font-size:12px}
.import-info .year-tag{font-weight:700;color:var(--navy);font-size:13px}
.import-info .sub-tag{color:#64748b;font-size:11px}
.import-status{font-size:11px;font-weight:700;padding:3px 9px;border-radius:12px}
.import-status.ok{background:#dcfce7;color:#16a34a}
.import-status.none{background:#f1f5f9;color:#94a3b8}
.import-status.err{background:#fee2e2;color:#dc2626}
.import-file-btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--navy);background:#fff;color:var(--navy)}
.import-file-btn.loaded{border-color:#16a34a;color:#16a34a}
.import-file-input{display:none}
.import-err-msg{font-size:11px;color:#dc2626;padding:4px 14px 6px;display:none}

.info-table{width:100%;border-collapse:collapse;font-size:12px}
.info-table th{background:#f0f4f8;font-weight:600;padding:7px 10px;border:1px solid #cbd5e1;text-align:left;white-space:nowrap}
.info-table td{padding:7px 10px;border:1px solid #cbd5e1;text-align:center}

#msg-area{font-size:12px;display:none;padding:8px 12px;border-radius:6px;margin-top:8px}
#msg-area.ok{background:#dcfce7;color:#16a34a}
#msg-area.err{background:#fee2e2;color:#dc2626}
.small {
  font-size: 0.6em;   /* h1 の 70% の大きさ */
}
</style>
</head>

    female:[{s:10,lo:23,hi:Infinity},{s:9,lo:20,hi:22},{s:8,lo:18,hi:19},{s:7,lo:16,hi:17},{s:6,lo:14,hi:15},{s:5,lo:12,hi:13},{s:4,lo:11,hi:11},{s:3,lo:10,hi:10},{s:2,lo:8,hi:9},{s:1,lo:-Infinity,hi:7}]
  }
};
function scoreIt(val,tbl){for(const r of tbl)if(val>=r.lo&&val<=r.hi)return r.s;return 1;}

const GRADE_TBL={12:{A:51,B:41,C:32,D:22},13:{A:57,B:41,C:32,D:22},14:{A:60,B:47,C:32,D:22},
  15:{A:61,B:51,C:37,D:22},16:{A:63,B:52,C:41,D:27},17:{A:65,B:53,C:41,D:31},
  18:{A:65,B:54,C:42,D:31},19:{A:65,B:54,C:43,D:31}};
function getGrade(age,tot){const g=GRADE_TBL[age];if(!g)return null;if(tot>=g.A)return'A';if(tot>=g.B)return'B';if(tot>=g.C)return'C';if(tot>=g.D)return'D';return'E';}
const GRADE_COL={A:'#16a34a',B:'#2563eb',C:'#d97706',D:'#ea580c',E:'#dc2626'};
const GRADE_DESC={A:'非常に優れている',B:'優れている',C:'普通',D:'やや劣る',E:'劣る'};

// =====================================================================
//  HELPERS
// =====================================================================
function tScore(val,stats,lowerBetter=false){
  if(val===null||val===undefined||!stats||stats.sd===0)return null;
  return lowerBetter?(stats.mean-val)/stats.sd*10+50:(val-stats.mean)/stats.sd*10+50;
}
function maxOf(...a){const v=a.flat().filter(x=>x!==null&&x!==undefined);return v.length?Math.max(...v):null;}
function avgOf(arr){const v=arr.filter(x=>x!==null&&x!==undefined);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}

// =====================================================================
//  PARSE LOADED EXCEL DATA
// =====================================================================
function parseLoadedExcel(arrayBuffer){
  const wb=XLSX.read(arrayBuffer,{type:'array'});
  const ws=wb.Sheets['入力データ'];
  if(!ws)throw new Error('「入力データ」シートが見つかりません');
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  const fm={};
  for(let i=1;i<rows.length;i++){if(rows[i][0])fm[String(rows[i][0])]=String(rows[i][1]);}
  const normData={};
  const ws2=wb.Sheets['規範データ'];
  if(ws2){
    const nr=XLSX.utils.sheet_to_json(ws2,{header:1,defval:''});
    for(let i=1;i<nr.length;i++){
      const[key,mean,sd]=nr[i];
      if(key&&!isNaN(Number(mean))&&!isNaN(Number(sd))&&Number(sd)>0)
        normData[String(key)]={mean:Number(mean),sd:Number(sd)};
    }
  }
  return{fm,normData};
}

function pN(s){if(s===''||s===null||s===undefined)return null;const n=Number(s);return isNaN(n)?null:n;}

function computeFromFields(fm,normData){
  const sex=fm.sex||'';
  const age=pN(fm.age);
  const h=pN(fm.height),w=pN(fm.weight),bf=pN(fm.bodyfat);
  const r1=pN(fm.gr1),r2=pN(fm.gr2),l1=pN(fm.gl1),l2=pN(fm.gl2);
  const rMax=maxOf(r1,r2),lMax=maxOf(l1,l2);
  const grip=(rMax!==null||lMax!==null)?Math.round(((rMax??0)+(lMax??0))/((rMax!==null?1:0)+(lMax!==null?1:0))):null;
  const fb=maxOf(pN(fm.fb1),pN(fm.fb2));
  const ss=maxOf(pN(fm.ss1),pN(fm.ss2));
  const bj=maxOf(pN(fm.bj1),pN(fm.bj2));
  const hb=maxOf(pN(fm.hb1),pN(fm.hb2));
  const emin=pN(fm.emin),esec=pN(fm.esec);
  const eSecs=(emin!==null||esec!==null)?(emin??0)*60+(esec??0):null;
  const situp=pN(fm.situp);
  const shuttle=pN(fm.shuttle);
  const dash=pN(fm.dash);
  const bmi=(h&&w)?Math.round(w/((h/100)**2)*10)/10:null;
  let bmiCat=null,comp=null;
  if(bmi!==null)bmiCat=bmi<18.5?'低体重':bmi<25?'普通体重':'肥満';
  if(bmi!==null&&bf!==null&&sex){
    const fh=sex==='male'?bf>=20:bf>=30;
    if(bmi>=25)comp=fh?'過体重肥満':'筋肉質';
    else if(bmi>=18.5)comp=fh?'隠れ肥満':'正常';
    else comp=fh?'低体重型隠れ肥満':'やせ';
  }
  const S={};
  if(sex){
    S.grip  =grip!==null  ?scoreIt(grip,  SCORE_TABLES.grip[sex])        :null;
    S.situp =situp!==null ?scoreIt(situp, SCORE_TABLES.situp[sex])       :null;
    S.fb    =fb!==null    ?scoreIt(fb,    SCORE_TABLES.forwardbend[sex]) :null;
    S.ss    =ss!==null    ?scoreIt(ss,    SCORE_TABLES.sidestep[sex])    :null;
    S.endur =eSecs!==null ?scoreIt(eSecs, SCORE_TABLES.endurance[sex])   :null;
    S.sht   =shuttle!==null?scoreIt(shuttle,SCORE_TABLES.shuttle[sex])   :null;
    const dt=dash!==null?Math.round(dash*10):null;
    S.dash  =dt!==null    ?scoreIt(dt,    SCORE_TABLES.dash50[sex])      :null;
    S.bj    =bj!==null    ?scoreIt(bj,    SCORE_TABLES.broadjump[sex])   :null;
    S.hb    =hb!==null    ?scoreIt(hb,    SCORE_TABLES.handball[sex])    :null;
    S.cardio=maxOf(S.endur,S.sht);
  }
  const all8=[S.grip,S.situp,S.fb,S.ss,S.cardio,S.dash,S.bj,S.hb];
  S.total=all8.every(v=>v!==null)?all8.reduce((a,b)=>a+b,0):null;
  const grade=(S.total!==null&&age!==null)?getGrade(age,S.total):null;
  const abilStart  =avgOf([S.dash,S.ss]);
  const abilSustain=avgOf([S.cardio,S.situp]);
  const abilReg    =avgOf([S.ss,S.bj,S.hb]);
  const gN=k=>normData[`${k}_${sex}`]||null;
  const ts={};
  if(sex){
    ts.grip  =tScore(grip,  gN('grip'));
    ts.situp =tScore(situp, gN('situp'));
    ts.fb    =tScore(fb,    gN('forwardbend'));
    ts.ss    =tScore(ss,    gN('sidestep'));
    ts.shuttle=tScore(shuttle,gN('shuttle'));
    ts.endur =tScore(eSecs, gN('endurance'),true);
    ts.dash  =tScore(dash,  gN('dash50'),true);
    ts.bj    =tScore(bj,    gN('broadjump'));
    ts.hb    =tScore(hb,    gN('handball'));
    ts.cardio=maxOf(ts.shuttle,ts.endur);
    ts.total =tScore(S.total,gN('totalscore'));
  }
  const fatMass=(w!==null&&bf!==null)?Math.round(w*bf/100*10)/10:null;
  const leanMass=(w!==null&&fatMass!==null)?Math.round((w-fatMass)*10)/10:null;
  return{sex,age,h,w,bf,bmi,bmiCat,comp,grip,situp,fb,ss,bj,hb,eSecs,shuttle,dash,
    S,grade,abilStart,abilSustain,abilReg,ts,fatMass,leanMass,
    year:fm.testyear||'',name:(fm.name||'').replace(/[\s\u3000]+/g,' ').trim(),number:fm.number||'',affil:fm.affil||'',grade_:fm.grade||''};
}

// =====================================================================
//  APP STATE
// =====================================================================
let count=4;
const datasets=[];

function getCount(){return parseInt(document.getElementById('count-sel').value);}

// Sort by year ascending; ties preserve import order (index in datasets array)
function sortedDatasets(){
  return datasets.map((d,i)=>({d,i})).filter(({d})=>d!==null).sort((a,b)=>{
    const ya=parseInt(a.d.computed.year)||0;
    const yb=parseInt(b.d.computed.year)||0;
    if(ya!==yb)return ya-yb;
    return a.i-b.i;
  }).map(({d})=>d);
}

// =====================================================================
//  BUILD IMPORT SLOTS UI
// =====================================================================
function buildSlots(){
  count=getCount();
  while(datasets.length>count)datasets.pop();
  while(datasets.length<count)datasets.push(null);

  const container=document.getElementById('import-slots');
  container.innerHTML='';
  for(let i=0;i<count;i++){
    const d=datasets[i];
    const step=document.createElement('div');
    step.className='import-step'+(d?' loaded':'');
    step.id='slot-'+i;

    const num=document.createElement('div');
    num.className='import-num';
    num.textContent=i+1;

    const info=document.createElement('div');
    info.className='import-info';
    if(d){
      const C=d.computed;
      const affiliMap={junior:'中学校',high:'高等学校',kosen:'高等専門学校',jcollege:'短期大学',university:'大学'};
      const aff=affiliMap[C.affil]||C.affil||'―';
      const gr=C.grade_?C.grade_+'年':'―';
      info.innerHTML=`<div class="year-tag">${C.year||'年不明'}年</div><div class="sub-tag">${aff} ${gr} ${C.age!==null?C.age+'歳':''}  No.${C.number||'―'}</div>`;
    }else{
      info.innerHTML=`<div class="year-tag" style="color:#94a3b8">${i+1}件目のデータ</div><div class="sub-tag">Excelファイルを読み込んでください</div>`;
    }

    const st=document.createElement('span');
    st.className='import-status '+(d?'ok':'none');
    st.textContent=d?'✓ 読込済':'未読込';
    st.id='slot-st-'+i;

    const btn=document.createElement('label');
    btn.className='import-file-btn'+(d?' loaded':'');
    btn.setAttribute('for','slot-input-'+i);
    btn.textContent=d?'再読込':'読み込む';

    const inp=document.createElement('input');
    inp.type='file';inp.accept='.xlsx,.xls';inp.className='import-file-input';inp.id='slot-input-'+i;
    inp.addEventListener('change',function(e){
      if(e.target.files.length>0)handleSlotFile(i,e.target.files[0]);
    });

    step.append(num,info,st,btn,inp);
    container.appendChild(step);

    const err=document.createElement('div');
    err.className='import-err-msg';err.id='slot-err-'+i;
    container.appendChild(err);
  }
  refreshInfoCard();
  refreshExportBtn();
}

function handleSlotFile(idx,file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const{fm,normData}=parseLoadedExcel(e.target.result);
      const computed=computeFromFields(fm,normData);
      datasets[idx]={fm,normData,computed};
      buildSlots();
      showMsg(true,`${idx+1}件目のデータを読み込みました（${computed.year||'年不明'}年 ${computed.name||''}）`);
    }catch(err){
      console.error(err);
      const errEl=document.getElementById('slot-err-'+idx);
      if(errEl){errEl.style.display='block';errEl.textContent='読み込みエラー: '+err.message;}
      showMsg(false,'読み込みエラー: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function refreshInfoCard(){
  const card=document.getElementById('info-card');
  const loaded=sortedDatasets();
  if(loaded.length===0){card.style.display='none';return;}
  card.style.display='block';

  const affiliMap={junior:'中学校',high:'高等学校',kosen:'高等専門学校',jcollege:'短期大学',university:'大学'};
  const firstName=loaded[0].computed.name||'―';
  const sexLabel=loaded[0].computed.sex==='male'?'男子':loaded[0].computed.sex==='female'?'女子':'―';

  let html=`<div style="margin-bottom:12px;font-size:13px"><strong>氏名：</strong>${firstName}　<strong>性別：</strong>${sexLabel}</div>`;
  html+=`<table class="info-table"><thead><tr><th>項目</th>`;
  for(const d of loaded){
    const C=d.computed;
    const aff=affiliMap[C.affil]||'―';
    const gr=C.grade_?C.grade_+'年':'―';
    html+=`<th style="text-align:center">${C.year||'―'}年<br><span style="font-size:10px;font-weight:400">${aff} ${gr} ${C.age!==null?C.age+'歳':''}</span></th>`;
  }
  html+=`</tr></thead><tbody>`;
  const rows2=[
    ['身長 (cm)',d=>d.computed.h!==null?d.computed.h.toFixed(1):'―'],
    ['体重 (kg)',d=>d.computed.w!==null?d.computed.w.toFixed(1):'―'],
    ['体脂肪率 (%)',d=>d.computed.bf!==null?d.computed.bf.toFixed(1)+'%':'―'],
    ['BMI',d=>d.computed.bmi!==null?d.computed.bmi.toFixed(1):'―'],
    ['合計点',d=>d.computed.S.total!==null?d.computed.S.total:'―'],
  ];
  for(const[label,fn]of rows2){
    html+=`<tr><th>${label}</th>`;
    for(const d of loaded)html+=`<td>${fn(d)}</td>`;
    html+=`</tr>`;
  }
  html+=`</tbody></table>`;
  document.getElementById('info-area').innerHTML=html;
}

function refreshExportBtn(){
  const btn=document.getElementById('export-btn');
  const allLoaded=datasets.slice(0,count).every(Boolean);
  btn.disabled=!allLoaded;
}

function showMsg(ok,text){
  const el=document.getElementById('msg-area');
  el.style.display='block';
  el.className=ok?'ok':'err';
  el.textContent=text;
  if(ok)setTimeout(()=>{el.style.display='none';},3000);
}

// =====================================================================
//  COLOR HELPERS
// =====================================================================
function colorForT(t){
  if(t===null||t===undefined)return'#94a3b8';
  if(t>=60)return'#16a34a';if(t>=50)return'#2563eb';if(t>=40)return'#d97706';return'#dc2626';
}
function colorForScore(s){
  if(s===null||s===undefined)return'#94a3b8';
  if(s>=8)return'#16a34a';if(s>=6)return'#2563eb';if(s>=4)return'#d97706';return'#dc2626';
}

  // レーダーチャート用データ

  const LINE_COLORS=['#2563eb','#dc2626','#16a34a','#d97706'];

    '  datasets.forEach(function(ds,di){',
    '    var col=LINE_COLORS[di%LINE_COLORS.length];',
    '    var hasAny=ds.values.some(function(v){return v!==null&&v!==undefined;});',
    '    if(!hasAny)return;',
    '    var hex=parseInt(col.slice(1),16);',
    '    ctx.strokeStyle=col;ctx.lineWidth=2.2;',

    '      var va=ds.values[ei],vb=ds.values[(ei+1)%n2];',
    '      if(va===null||va===undefined||vb===null||vb===undefined)continue;',
    '      var ra=tToR(Math.max(0,Math.min(100,va))),rb=tToR(Math.max(0,Math.min(100,vb)));',
    '      var aa=ang(ei),ab=ang((ei+1)%n2);',
    '      ctx.beginPath();ctx.moveTo(cx+Math.cos(aa)*ra,cy+Math.sin(aa)*ra);ctx.lineTo(cx+Math.cos(ab)*rb,cy+Math.sin(ab)*rb);ctx.stroke();',
    '    }',
    '    ds.values.forEach(function(v,i){',
    '      if(v===null||v===undefined)return;',
    '      var r=tToR(Math.max(0,Math.min(100,v)));',
    '      var a=ang(i),x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;',
    '      ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();',
    '    });',
    '  });',
    '  ctx.font="bold 12px Hiragino Sans,Meiryo,sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";',
    '  labels.forEach(function(lbl,i){',
    '    var a=ang(i),dist=rMax+lblPad-10;',
    '    var lx=cx+Math.cos(a)*dist,ly=cy+Math.sin(a)*dist;',
    '    var parts=lbl.split("\\n");',
    '    var lineH=14,totalH=(parts.length-1)*lineH;',
    '    var mx=6,my=6;lx=Math.max(mx,Math.min(W-mx,lx));',
    '    var topY=ly-totalH/2-lineH/2;if(topY<my)ly=my+lineH/2;',
    '    var botY=ly+totalH/2+lineH/2;if(botY>H-my)ly=H-my-lineH/2-totalH/2;',
    '    ctx.fillStyle="#1e293b";',
    '    parts.forEach(function(pt,pi){ctx.fillText(pt,lx,ly+(pi-(parts.length-1)/2)*lineH);});',
    '  });',
    '  ctx.font="9px Hiragino Sans,Meiryo,sans-serif";ctx.fillStyle="#64748b";',
    '  ctx.textAlign="right";ctx.textBaseline="middle";',
    '  [20,50,80].forEach(function(t){ctx.fillText(""+t,cx+tToR(t)-2,cy-4);});',
    '  var legY=12;',
    '  ctx.font="bold 10px Hiragino Sans,Meiryo,sans-serif";ctx.textAlign="right";ctx.textBaseline="middle";',
    '  datasets.forEach(function(ds,di){',
    '    var col=LINE_COLORS[di%LINE_COLORS.length];',
    '    var y=legY+di*16;',
    '    ctx.fillStyle="#1e293b";ctx.fillText(ds.year+"\u5e74",W-8,y);',
    '    ctx.fillStyle=col;ctx.fillRect(W-8-ctx.measureText(ds.year+"\u5e74").width-22,y-4,18,8);',
    '  });',
    '}',
    'window.addEventListener("load",function(){',
    '  var labels='+JSON.stringify(radarLabels)+';',
    '  if(__rd){var c=document.getElementById("multi-radar");if(c)drawMultiRadar(c,__rd,labels);}',
    '  setTimeout(function(){window.print();},600);',
    '});'
  ].join('\n');

  const p2=`<div class="pa-page">
  <div style="border-bottom:2px solid #1e3a5f;padding-bottom:5px;margin-bottom:10px">
    <div style="font-size:20px;font-weight:700;text-align:center;color:#1e3a5f">新体力テスト結果の比較レポート（分析資料）</div>
  </div>
  ${p2Comp}
  ${p2TScore}
  <canvas id="multi-radar" width="520" height="340" style="display:block;margin:calc(10px + 6mm) auto 0"></canvas>
  <div style="text-align:center;margin-top:18mm;font-size:9px;color:#94a3b8">- 2 -</div>
</div>`;

  const T={
    doctype:'\u003c!DOCTYPE html\u003e',htmlO:'\u003chtml lang="ja"\u003e',htmlC:'\u003c/html\u003e',
    headO:'\u003chead\u003e',headC:'\u003c/head\u003e',meta:'\u003cmeta charset="UTF-8"\u003e',
    titleO:'\u003ctitle\u003e',titleC:'\u003c/title\u003e',
    styleO:'\u003cstyle\u003e',styleC:'\u003c/style\u003e',
    scriptO:'\u003cscript\u003e',scriptC:'\u003c/script\u003e',
    bodyO:'\u003cbody\u003e',bodyC:'\u003c/body\u003e',
    btnO:'\u003cbutton class="print-btn" onclick="window.print()"\u003e',btnC:'\u003c/button\u003e',
  };

  const fullHTML=T.doctype+T.htmlO+
    T.headO+T.meta+T.titleO+'新体力テスト結果の比較レポート'+T.titleC+
    T.styleO+printCSS+T.styleC+T.scriptO+scriptCode+T.scriptC+T.headC+
    T.bodyO+T.btnO+'印刷する'+T.btnC+p1+p2+T.bodyC+T.htmlC;

  const blob=new Blob([fullHTML],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const _now=new Date();
  const _dateStr=`${_now.getFullYear()}${String(_now.getMonth()+1).padStart(2,'0')}${String(_now.getDate()).padStart(2,'0')}`;
  a.href=url;a.download=`体力テスト比較レポート_${_dateStr}.html`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),10000);
  const msg=document.getElementById('export-msg');
  msg.style.display='inline';msg.style.color='#16a34a';
  msg.textContent='HTMLファイルをダウンロードしました。ファイルを開くと印刷ダイアログが起動します。';
  setTimeout(()=>{msg.style.display='none';},4000);
}
